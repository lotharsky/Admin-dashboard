<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-straight/css/uicons-regular-straight.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="container">
        <div class="side-bar">
            <div class="dash-logo">
                <div class="logo-container">
                    <div class="logo-block-1"></div>
                    <div class="logo-block-2"></div>
                    <div class="logo-block-3"></div>
                    <div class="logo-block-4"></div>
                </div>
                <p id="logo-name">Dashboard</p>
            </div>
            
            <nav class="app-nav">
                <a href="#">
                    <i class="fi fi-rr-home"></i>
                    <span>Home</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-portrait"></i>
                    <span>Profile</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-comment-alt-middle"></i>
                    <span>Messages</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-clock-three"></i>
                    <span>History</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-layers"></i>
                    <span>Tasks</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-users-alt"></i>
                    <span>Communities</span>
                </a>
            </nav>

            <nav class="settings-nav">
                <a href="#">
                    <i class="fi fi-rr-settings"></i>
                    <span>Settings</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-comment-question"></i>
                    <span>Support</span>
                </a>
                <a href="#">
                    <i class="fi fi-rr-shield-check"></i>
                    <span>Privacy</span>
                </a>
            </nav>
        </div>

        <div class="header">
            <div class="hdr-search">
                <form action="">
                    <i class="fi fi-rr-search"></i>
                    <input type="text" name="searchbar" id="">
                </form>
            </div>
            <div class="hdr-user-info">
                <div class="hdr-user-profile-pfpic" id="pfp-big"></div>
                <div class="hdr-user-info-text">
                    <p>Hi there,</p>
                    <p id="userAT">Lothar Henne (@Lotharsky)</p>
                </div>
            </div>
            <div class="hdr-user-profile">
                <i class="fi fi-rs-bell"></i>
                <div class="hdr-user-profile-pfpic"></div>
                <p>Lothar Henne</p>
            </div>
            <div class="hdr-buttons">
                <div class="hdr-btns">New</div>
                <div class="hdr-btns">Upload</div>
                <div class="hdr-btns">Share</div>
            </div>
        </div>

        <div class="main-content"></div>
    </div>


</body>
</html>
